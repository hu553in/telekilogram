#:schema https://www.schemastore.org/prek.json

default_install_hook_types = ["pre-commit", "commit-msg"]
default_stages = ["pre-commit"]

[[repos]]
repo = "builtin"

[[repos.hooks]]
id = "mixed-line-ending"
priority = 40

[[repos.hooks]]
id = "trailing-whitespace"
priority = 50

[[repos.hooks]]
id = "end-of-file-fixer"
priority = 60

[[repos.hooks]]
id = "check-yaml"
args = ["--allow-multiple-documents"]
priority = 100

[[repos.hooks]]
id = "check-toml"
priority = 100

[[repos.hooks]]
id = "check-json"
priority = 100

[[repos.hooks]]
id = "check-merge-conflict"
priority = 100

[[repos]]
repo = "local"

[[repos.hooks]]
id = "check-fix"
name = "check fix"
entry = "make check-fix"
language = "system"
always_run = true
pass_filenames = false
priority = 90

[[repos.hooks]]
id = "commitlint"
name = "commitlint"
entry = "bunx --silent --package @commitlint/cli@latest commitlint --default-config --strict --edit"
language = "system"
stages = ["commit-msg"]

version: 2

updates:
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    assignees:
      - hu553in
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
      major:
        update-types:
          - major
  - package-ecosystem: docker
    directories:
      - '/'
    schedule:
      interval: weekly
    assignees:
      - hu553in
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
      major:
        update-types:
          - major
  - package-ecosystem: gomod
    directory: '/'
    schedule:
      interval: weekly
    assignees:
      - hu553in
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
      major:
        update-types:
          - major
